<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark" />
    <title>e621 Mask Maker (Image/GIF)</title>

    <script type="module" src="https://unpkg.com/@material/web@1.5.0/labs/behaviors/rola/rola.js"></script>
    <link rel="stylesheet" href="src/lib/sonner.css"/>
 <script type="module">
 import '@material/web/textfield/filled-text-field.js';
 import '@material/web/select/filled-select.js';
 import '@material/web/select/select-option.js';</script>
    <link rel="stylesheet" href="src/style.css"/>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <script src="src/lib/sonner.js"></script>
    <script src="src/script.js" defer></script>
</head>
<body>
    <main class="container center-content">
        <md-card>
            <header class="text-center">
                <h1>e621 Bubble speach</h1>
            </header>

            <div class="notice-box danger" role="alert">
                <strong>Proxy Info:</strong> Uses a public CORS proxy (`corsproxy.io`)
            </div>

            <form>
                <div class="grid input-grid">
                    <md-filled-text-field
                        label="Tags"
                        id="tagsInput"
                        placeholder="e.g., canine fluffy rating:s"
                        required
                    ></md-filled-text-field>
                    <md-filled-select
                        label="Rating"
                        id="ratingSelect"
                        multiple
                    >
                        <md-select-option value="s" selected>
                            <div slot="headline">Safe</div>
                        </md-select-option>
                        <md-select-option value="q">
                            <div slot="headline">Questionable</div>
                        </md-select-option>
                        <md-select-option value="e">
                            <div slot="headline">Explicit</div>
                        </md-select-option>
                    </md-filled-select>
                </div>
                <div class="text-center action-button-wrapper">
                    <md-filled-button type="button" id="fetchButton">generate GIF</md-filled-button>
                </div>
            </form>

            <progress id="loader" hidden></progress>

            <section id="resultArea" class="text-center md-card" hidden>
                <h2>Your Masked GIF:</h2>
                <canvas id="gifCanvas"></canvas>
                <p id="imageInfo"><small>Image info shows up here.</small></p>
                <div class="grid result-buttons">
                    <md-filled-button type="button" id="copyButton" hidden>Copy GIF</md-filled-button>
                    <md-outlined-button type="button" id="downloadButton" hidden>Download GIF</md-outlined-button>
                </div>
            </section>
        </md-card>
    </main>
</body>
</html>
